name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  vercel:
    name: Vercel production
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_9qBQFzUUINI2UsEHyV9SGnX2
      VERCEL_PROJECT_ID: prj_c7XeKUUEBOqQ2S3EXNCSG590Agxw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npx vercel@54.21.1 pull --yes --environment=production --scope quid-courtage-et-conseils --token="${{ secrets.VERCEL_TOKEN }}"
      - run: npx vercel@54.21.1 build --prod --token="${{ secrets.VERCEL_TOKEN }}"
      - run: npx vercel@54.21.1 deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"

  railway:
    name: Railway production
    runs-on: ubuntu-latest
    env:
      RAILWAY_PROJECT_ID: 76a79f71-f301-4749-ad41-2f9e0f6cd583
      RAILWAY_SERVICE_ID: 8ba63edd-78ed-4be6-8b14-839f58a28b2e
      RAILWAY_ENVIRONMENT: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npx @railway/cli@4.30.5 up --project "$RAILWAY_PROJECT_ID" --service "$RAILWAY_SERVICE_ID" --environment "$RAILWAY_ENVIRONMENT" --ci --message "${{ github.sha }}"
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
